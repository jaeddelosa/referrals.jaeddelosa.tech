<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Secure Gateway | Encrypted Redirect</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0B1120, #030614);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* soft glowing orb effect - ambiance */
    body::after {
      content: "";
      position: fixed;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(0, 180, 255, 0.08) 0%, rgba(0, 180, 255, 0) 70%);
      top: 30%;
      left: -20%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* main gateway card */
    .gateway-card {
      position: relative;
      z-index: 10;
      max-width: 560px;
      width: 100%;
      background: rgba(12, 20, 35, 0.75);
      backdrop-filter: blur(14px);
      border-radius: 2rem;
      border: 1px solid rgba(0, 212, 255, 0.3);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 212, 255, 0.1) inset, 0 0 18px rgba(0, 160, 255, 0.2);
      transition: all 0.2s ease;
      overflow: hidden;
    }

    /* gradient edge highlight */
    .gateway-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 2rem;
      padding: 1.5px;
      background: linear-gradient(125deg, rgba(0, 212, 255, 0.6), rgba(0, 255, 196, 0.2), rgba(0, 212, 255, 0));
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      -webkit-mask-composite: xor;
      pointer-events: none;
    }

    /* content padding */
    .gateway-content {
      padding: 2.2rem 2rem 2.2rem 2rem;
    }

    /* shield + lock icon */
    .shield-icon {
      display: flex;
      justify-content: center;
      margin-bottom: 1.75rem;
    }
    .shield-svg {
      width: 68px;
      height: 68px;
      filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.6));
      animation: soft-float 3s ease-in-out infinite;
    }
    @keyframes soft-float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
      100% { transform: translateY(0px); }
    }

    /* headings & texts */
    .gateway-title {
      font-size: 1.85rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #FFFFFF 0%, #B0E0FF 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .badge-row {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .badge {
      background: rgba(0, 212, 255, 0.12);
      backdrop-filter: blur(4px);
      padding: 0.25rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      color: #A0D0FF;
      border: 0.5px solid rgba(0, 212, 255, 0.4);
      text-transform: uppercase;
    }
    .badge i {
      font-style: normal;
      display: inline-block;
    }

    /* Security steps – simulated verification */
    .verification-steps {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 1.2rem;
      padding: 0.9rem 1.2rem;
      margin: 1.8rem 0 1.8rem 0;
      border: 1px solid rgba(0, 200, 255, 0.2);
      backdrop-filter: blur(4px);
    }
    .step {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      font-size: 0.85rem;
      padding: 0.4rem 0;
      color: #CCE4FF;
    }
    .step-icon {
      width: 22px;
      text-align: center;
      font-weight: 600;
    }
    .step-text {
      flex: 1;
    }
    .step-status {
      font-weight: 500;
      font-size: 0.75rem;
      color: #6EE7FF;
      background: rgba(0, 255, 200, 0.1);
      padding: 0.1rem 0.5rem;
      border-radius: 20px;
    }
    .step.completed .step-status {
      color: #66FFCC;
      text-shadow: 0 0 2px #00ccaa30;
    }

    /* Progress bar */
    .progress-section {
      margin: 1.8rem 0 1.3rem 0;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      margin-bottom: 0.5rem;
      color: #84B0E0;
      letter-spacing: 0.3px;
    }
    .progress-track {
      background: rgba(0, 20, 45, 0.7);
      border-radius: 40px;
      height: 8px;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
      border: 0.5px solid rgba(0, 180, 255, 0.4);
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00C6FF, #7A2EFF, #00E0FF);
      border-radius: 40px;
      box-shadow: 0 0 8px #00b7ff;
      transition: width 0.02s linear;
    }

    /* countdown */
    .countdown-block {
      text-align: center;
      margin-top: 1rem;
      font-weight: 500;
    }
    .countdown-digits {
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: #EEF5FF;
      background: rgba(0, 0, 0, 0.5);
      display: inline-block;
      padding: 0.1rem 0.9rem;
      border-radius: 50px;
      backdrop-filter: blur(4px);
      letter-spacing: 1px;
    }

    /* pulse effect on border */
    @keyframes gentlePulse {
      0% { border-color: rgba(0, 212, 255, 0.3); box-shadow: 0 0 0 0 rgba(0, 180, 255, 0.2);}
      50% { border-color: rgba(0, 230, 255, 0.6); box-shadow: 0 0 0 4px rgba(0, 180, 255, 0.15);}
      100% { border-color: rgba(0, 212, 255, 0.3); box-shadow: 0 0 0 0 rgba(0, 180, 255, 0);}
    }
    .gateway-card {
      animation: gentlePulse 2.2s infinite ease;
    }

    /* responsiveness */
    @media (max-width: 500px) {
      .gateway-content {
        padding: 1.6rem 1.2rem;
      }
      .gateway-title {
        font-size: 1.6rem;
      }
      .step-text {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>

<div class="gateway-card">
  <div class="gateway-content">
    
    <!-- shield + lock icon -->
    <div class="shield-icon">
      <svg class="shield-svg" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 4L8 10V20C8 30 16 38 24 42C32 38 40 30 40 20V10L24 4Z" stroke="url(#shieldGrad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="rgba(0, 160, 255, 0.1)"/>
        <path d="M24 13V24M24 31V31.5" stroke="#6DC7FF" stroke-width="2" stroke-linecap="round"/>
        <path d="M18 24H30" stroke="#6DC7FF" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="24" cy="30" r="1.5" fill="#00E0FF" stroke="none"/>
        <defs>
          <linearGradient id="shieldGrad" x1="8" y1="4" x2="40" y2="42" gradientUnits="userSpaceOnUse">
            <stop stop-color="#00E0FF"/>
            <stop offset="1" stop-color="#7A2EFF"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <h1 class="gateway-title">Secure Gateway</h1>
    <div class="badge-row">
      <span class="badge"><i>🔒 TLS 1.3</i></span>
      <span class="badge"><i>🛡️ Encrypted Channel</i></span>
      <span class="badge"><i>⚡ Zero Trust</i></span>
    </div>

    <!-- verification steps -->
    <div class="verification-steps" id="verificationSteps">
      <div class="step" id="step1">
        <div class="step-icon">🔐</div>
        <div class="step-text">Establishing secure handshake</div>
        <div class="step-status" id="step1Status">✓ OK</div>
      </div>
      <div class="step" id="step2">
        <div class="step-icon">🛡️</div>
        <div class="step-text">Validating session integrity</div>
        <div class="step-status" id="step2Status">✓ PASS</div>
      </div>
      <div class="step" id="step3">
        <div class="step-icon">⚡</div>
        <div class="step-text">Routing to secure enclosure</div>
        <div class="step-status" id="step3Status">→ ACTIVE</div>
      </div>
    </div>

    <!-- progress bar -->
    <div class="progress-section">
      <div class="progress-header">
        <span>🔁 SECURE REDIRECTION PROGRESS</span>
        <span id="progressPercentage">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="countdown-block">
      <span class="countdown-digits" id="countdownDisplay">2.0 s</span>
    </div>
  </div>
</div>

<script>
  (function() {
    const TARGET_URL = "https://tally.so/r/WOpqNa";
    const REDIRECT_DELAY_MS = 2000;
    
    let startTime = null;
    let animationFrameId = null;
    let redirectTriggered = false;
    let intervalTimer = null;
    
    const progressFillEl = document.getElementById('progressFill');
    const percentageSpan = document.getElementById('progressPercentage');
    const countdownSpan = document.getElementById('countdownDisplay');
    const step3StatusSpan = document.getElementById('step3Status');
    
    function performRedirect() {
      if (redirectTriggered) return;
      redirectTriggered = true;
      
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      if (intervalTimer) clearInterval(intervalTimer);
      
      const card = document.querySelector('.gateway-card');
      if (card) {
        card.style.transition = "box-shadow 0.15s ease-out, transform 0.1s";
        card.style.transform = "scale(0.99)";
        card.style.boxShadow = "0 0 20px rgba(0,212,255,0.8), 0 0 0 2px rgba(0,255,210,0.3) inset";
      }
      
      setTimeout(() => {
        window.location.href = TARGET_URL;
      }, 45);
    }
    
    function updateProgressAndCountdown(now) {
      if (!startTime) return;
      const elapsed = now - startTime;
      const remainingMs = Math.max(0, REDIRECT_DELAY_MS - elapsed);
      const progressPercent = Math.min(100, (elapsed / REDIRECT_DELAY_MS) * 100);
      
      if (progressFillEl) progressFillEl.style.width = progressPercent + '%';
      if (percentageSpan) percentageSpan.innerText = Math.floor(progressPercent) + '%';
      
      const remainingSec = (remainingMs / 1000).toFixed(1);
      if (countdownSpan) countdownSpan.innerText = remainingSec + ' s';
      
      if (remainingMs <= 0 && !redirectTriggered) {
        performRedirect();
      }
      
      if (progressPercent >= 45 && step3StatusSpan && step3StatusSpan.innerText !== '✓ ROUTING') {
        step3StatusSpan.innerText = '✓ ROUTING';
        step3StatusSpan.style.color = '#66FFCC';
        const step3Parent = document.getElementById('step3');
        if(step3Parent) step3Parent.classList.add('completed');
      }
    }
    
    function startSmoothTimer() {
      startTime = performance.now();
      
      function tick(currentTime) {
        if (redirectTriggered) return;
        const elapsed = currentTime - startTime;
        if (elapsed >= REDIRECT_DELAY_MS) {
          updateProgressAndCountdown(startTime + REDIRECT_DELAY_MS);
          performRedirect();
          return;
        }
        updateProgressAndCountdown(currentTime);
        animationFrameId = requestAnimationFrame(tick);
      }
      animationFrameId = requestAnimationFrame(tick);
      
      intervalTimer = setInterval(() => {
        if (redirectTriggered) return;
        const nowFallback = performance.now();
        if (nowFallback - startTime >= REDIRECT_DELAY_MS) {
          performRedirect();
        }
      }, 50);
    }
    
    function initGateway() {
      startSmoothTimer();
      
      const step1Div = document.getElementById('step1');
      const step2Div = document.getElementById('step2');
      if (step1Div) step1Div.classList.add('completed');
      if (step2Div) step2Div.classList.add('completed');
    }
    
    window.addEventListener('load', () => {
      initGateway();
    });
    
    window.addEventListener('pageshow', (event) => {
      if (event.persisted || (performance.getEntriesByType('navigation')[0]?.type === 'back_forward')) {
        if (!redirectTriggered) {
          if (animationFrameId) cancelAnimationFrame(animationFrameId);
          if (intervalTimer) clearInterval(intervalTimer);
          startTime = null;
          redirectTriggered = false;
          if (progressFillEl) progressFillEl.style.width = '0%';
          if (percentageSpan) percentageSpan.innerText = '0%';
          if (countdownSpan) countdownSpan.innerText = '2.0 s';
          if (step3StatusSpan) step3StatusSpan.innerText = '→ ACTIVE';
          startSmoothTimer();
        }
      }
    });
  })();
</script>

<noscript>
  <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0B1120; z-index:9999; display:flex; align-items:center; justify-content:center; font-family:sans-serif;">
    <div style="background: rgba(0,0,0,0.8); padding: 2rem; border-radius: 2rem; text-align:center; border:1px solid #2c5c8e;">
      <h2 style="color:#BBE5FF;">Secure Gateway Required</h2>
      <p style="color:#ccc;">JavaScript is required for automatic redirection. Please enable JavaScript.</p>
    </div>
  </div>
</noscript>
</body>
</html>
